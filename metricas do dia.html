<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Magiway Widget</title>
  <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Open+Sans:400,600,700&subset=latin">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    html, body { width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; background: transparent; }
    .header-widget {
      background: linear-gradient(135deg, #0D1F4E 0%, #1a3070 60%, #0D1F4E 100%);
      padding: 50px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(13,31,78,0.35);
      position: relative;
      overflow: hidden;
      min-height: 160px;
    }
    .header-widget::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #C41E3A, #e8354f, #C41E3A);
    }
    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-img { height: 100px; width: auto; object-fit: contain; }
    .divider { width: 1px; height: 80px; background: rgba(255,255,255,0.2); }
    .metrics-center { flex: 1; display: flex; align-items: center; justify-content: center; }
    .metrics-title { font-size: 32px; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="header-widget">
    <div class="logo-area">
      <img class="logo-img" src="https://raw.githubusercontent.com/nexifysite/magiway-widget/main/logo.png" alt="Magiway Logo">
      <div class="divider"></div>
    </div>
    <div class="metrics-center">
      <span class="metrics-title">Métricas do Dia</span>
    </div>
  </div>
</body>
</html>
